<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Match-3</title>
    <link rel="manifest" href="manifest.json">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            
            /* Prevent native mobile text selection & callouts */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        .game-container {
            width: 100%;
            max-width: 480px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #score-board {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 12px;
            letter-spacing: 1px;
            color: #ffffff;
        }

        #score-value {
            color: #00e676; /* Vibrant green highlight for dynamic number */
        }

        canvas {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            background-color: #1e1e1e;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            touch-action: none; /* Disables default browser touch gestures */
            display: block;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Separate container keeps the label text safe -->
        <div id="score-board">SCORE: <span id="score-value">0</span></div>
        <canvas id="gameCanvas" width="480" height="480"></canvas>
    </div>

    <script>
        // --- PWA SERVICE WORKER REGISTRATION ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Error:', err));
            });
        }

        // --- GAME LOGIC & ENGINE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score-value');

        const GRID_SIZE = 8;
        const TILE_SIZE = canvas.width / GRID_SIZE; // 60px
        
        let score = 0;
        let grid = [];
        let selectedTile = null;

        // Distinct shape and color mapping
        const TILE_TYPES = [
            { id: 0, name: 'diamond',  color: '#e91e63' }, // Pink
            { id: 1, name: 'square',   color: '#2196f3' }, // Blue
            { id: 2, name: 'circle',   color: '#4caf50' }, // Green
            { id: 3, name: 'triangle', color: '#ffeb3b' }, // Yellow
            { id: 4, name: 'hexagon',  color: '#9c27b0' }, // Purple
            { id: 5, name: 'star',     color: '#ff9800' }  // Orange
        ];

        // --- AUDIO ENGINE (Web Audio API) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function playSwapSound() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // --- INITIALIZATION ---
        function initGrid() {
            grid = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                grid[r] = [];
                for (let c = 0; c < GRID_SIZE; c++) {
                    grid[r][c] = getRandomTileType();
                }
            }
            drawBoard();
        }

        function getRandomTileType() {
            return TILE_TYPES[Math.floor(Math.random() * TILE_TYPES.length)];
        }

        function updateScore(points) {
            score += points;
            scoreElement.innerText = score;
        }

        // --- RENDERING ROUTINES ---
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const tile = grid[r][c];
                    const x = c * TILE_SIZE;
                    const y = r * TILE_SIZE;

                    // Draw grid background cell
                    ctx.strokeStyle = '#2a2a2a';
                    ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);

                    // Draw tile shape if tile exists
                    if (tile) {
                        drawShape(ctx, x, y, TILE_SIZE, tile);
                    }

                    // Highlight selected tile
                    if (selectedTile && selectedTile.r === r && selectedTile.c === c) {
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                        ctx.lineWidth = 1;
                    }
                }
            }
        }

        function drawShape(ctx, x, y, size, tile) {
            const pad = size * 0.15;
            const cx = x + size / 2;
            const cy = y + size / 2;
            const w = size - pad * 2;
            const h = size - pad * 2;

            ctx.fillStyle = tile.color;
            ctx.beginPath();

            switch (tile.name) {
                case 'diamond':
                    ctx.moveTo(cx, y + pad);
                    ctx.lineTo(x + size - pad, cy);
                    ctx.lineTo(cx, y + size - pad);
                    ctx.lineTo(x + pad, cy);
                    break;

                case 'square':
                    ctx.rect(x + pad, y + pad, w, h);
                    break;

                case 'circle':
                    ctx.arc(cx, cy, w / 2, 0, Math.PI * 2);
                    break;

                case 'triangle':
                    ctx.moveTo(cx, y + pad);
                    ctx.lineTo(x + size - pad, y + size - pad);
                    ctx.lineTo(x + pad, y + size - pad);
                    break;

                case 'hexagon':
                    const r = w / 2;
                    for (let i = 0; i < 6; i++) {
                        const angle = (Math.PI / 3) * i;
                        const hx = cx + r * Math.cos(angle);
                        const hy = cy + r * Math.sin(angle);
                        if (i === 0) ctx.moveTo(hx, hy);
                        else ctx.lineTo(hx, hy);
                    }
                    break;

                case 'star':
                    const outerR = w / 2;
                    const innerR = outerR / 2.2;
                    for (let i = 0; i < 10; i++) {
                        const radius = i % 2 === 0 ? outerR : innerR;
                        const angle = (Math.PI / 5) * i - Math.PI / 2;
                        const sx = cx + radius * Math.cos(angle);
                        const sy = cy + radius * Math.sin(angle);
                        if (i === 0) ctx.moveTo(sx, sy);
                        else ctx.lineTo(sx, sy);
                    }
                    break;
            }

            ctx.closePath();
            ctx.fill();
        }

        // --- INTERACTION LOGIC ---
        function handleTouch(e) {
            // Stops text selection, scrolling, and blue highlight artifacts
            e.preventDefault();

            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            // Map screen coordinates strictly to canvas internal coordinate space
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const col = Math.floor((clientX - rect.left) * scaleX / TILE_SIZE);
            const row = Math.floor((clientY - rect.top) * scaleY / TILE_SIZE);

            if (col >= 0 && col < GRID_SIZE && row >= 0 && row < GRID_SIZE) {
                onTileSelect(row, col);
            }
        }

        function onTileSelect(r, c) {
            if (!selectedTile) {
                selectedTile = { r, c };
            } else {
                // Check if adjacent tap
                const distR = Math.abs(selectedTile.r - r);
                const distC = Math.abs(selectedTile.c - c);
                const isAdjacent = (distR === 1 && distC === 0) || (distR === 0 && distC === 1);

                if (isAdjacent) {
                    swapTiles(selectedTile.r, selectedTile.c, r, c);
                    playSwapSound();
                    updateScore(10); // Simple score bump for test
                    selectedTile = null;
                } else {
                    selectedTile = { r, c }; // Re-select new tile if not adjacent
                }
            }
            drawBoard();
        }

        function swapTiles(r1, c1, r2, c2) {
            const temp = grid[r1][c1];
            grid[r1][c1] = grid[r2][c2];
            grid[r2][c2] = temp;
        }

        // Attach listeners with passive: false to allow e.preventDefault()
        canvas.addEventListener('touchstart', handleTouch, { passive: false });
        canvas.addEventListener('mousedown', handleTouch);

        // Start
        initGrid();
    </script>
</body>
</html>
