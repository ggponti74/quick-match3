<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Match-3</title>
    <link rel="manifest" href="manifest.json">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            
            /* Prevent native mobile text selection & callouts */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        .game-container {
            width: 100%;
            max-width: 480px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        #score-board {
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: #ffffff;
        }

        #score-value {
            color: #00e676; /* Vibrant green highlight */
        }

        #reset-btn {
            background-color: #00adb5;
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: background-color 0.2s, transform 0.1s;
        }

        #reset-btn:active {
            transform: scale(0.96);
            background-color: #008c93;
        }

        canvas {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            background-color: #1e1e1e;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            touch-action: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <header>
            <div id="score-board">SCORE: <span id="score-value">0</span></div>
            <button id="reset-btn">NEW GAME</button>
        </header>
        <canvas id="gameCanvas" width="480" height="480"></canvas>
    </div>

    <script>
        // --- PWA SERVICE WORKER REGISTRATION ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Error:', err));
            });
        }

        // --- GAME ENGINE SETUP ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score-value');
        const resetBtn = document.getElementById('reset-btn');

        const GRID_SIZE = 8;
        const TILE_SIZE = canvas.width / GRID_SIZE; // 60px
        
        let score = 0;
        let grid = [];
        let selectedTile = null;
        let dragStartTile = null;
        let isProcessing = false;

        const TILE_TYPES = [
            { id: 0, name: 'diamond',  color: '#e91e63' }, // Pink
            { id: 1, name: 'square',   color: '#2196f3' }, // Blue
            { id: 2, name: 'circle',   color: '#4caf50' }, // Green
            { id: 3, name: 'triangle', color: '#ffeb3b' }, // Yellow
            { id: 4, name: 'hexagon',  color: '#9c27b0' }, // Purple
            { id: 5, name: 'star',     color: '#ff9800' }  // Orange
        ];

        // --- AUDIO ENGINE ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function playSound(freq, duration = 0.1, ramp = true) {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            if (ramp) {
                osc.frequency.exponentialRampToValueAtTime(freq * 1.5, audioCtx.currentTime + duration);
            }
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // --- GAME INITIALIZATION ---
        function initGame() {
            score = 0;
            scoreElement.innerText = score;
            selectedTile = null;
            dragStartTile = null;
            isProcessing = false;

            do {
                createRandomBoard();
            } while (checkMatches().length > 0); // Ensure clean board on start

            drawBoard();
        }

        function createRandomBoard() {
            grid = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                grid[r] = [];
                for (let c = 0; c < GRID_SIZE; c++) {
                    grid[r][c] = TILE_TYPES[Math.floor(Math.random() * TILE_TYPES.length)];
                }
            }
        }

        // --- RENDERING ROUTINES ---
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const tile = grid[r][c];
                    const x = c * TILE_SIZE;
                    const y = r * TILE_SIZE;

                    // Grid cell border
                    ctx.strokeStyle = '#2a2a2a';
                    ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);

                    if (tile) {
                        drawShape(ctx, x, y, TILE_SIZE, tile);
                    }

                    // Selection highlight
                    if (selectedTile && selectedTile.r === r && selectedTile.c === c) {
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                        ctx.lineWidth = 1;
                    }
                }
            }
        }

        function drawShape(ctx, x, y, size, tile) {
            const pad = size * 0.15;
            const cx = x + size / 2;
            const cy = y + size / 2;
            const w = size - pad * 2;
            const h = size - pad * 2;

            ctx.fillStyle = tile.color;
            ctx.beginPath();

            switch (tile.name) {
                case 'diamond':
                    ctx.moveTo(cx, y + pad);
                    ctx.lineTo(x + size - pad, cy);
                    ctx.lineTo(cx, y + size - pad);
                    ctx.lineTo(x + pad, cy);
                    break;
                case 'square':
                    ctx.rect(x + pad, y + pad, w, h);
                    break;
                case 'circle':
                    ctx.arc(cx, cy, w / 2, 0, Math.PI * 2);
                    break;
                case 'triangle':
                    ctx.moveTo(cx, y + pad);
                    ctx.lineTo(x + size - pad, y + size - pad);
                    ctx.lineTo(x + pad, y + size - pad);
                    break;
                case 'hexagon':
                    const r = w / 2;
                    for (let i = 0; i < 6; i++) {
                        const angle = (Math.PI / 3) * i;
                        const hx = cx + r * Math.cos(angle);
                        const hy = cy + r * Math.sin(angle);
                        if (i === 0) ctx.moveTo(hx, hy);
                        else ctx.lineTo(hx, hy);
                    }
                    break;
                case 'star':
                    const outerR = w / 2;
                    const innerR = outerR / 2.2;
                    for (let i = 0; i < 10; i++) {
                        const radius = i % 2 === 0 ? outerR : innerR;
                        const angle = (Math.PI / 5) * i - Math.PI / 2;
                        const sx = cx + radius * Math.cos(angle);
                        const sy = cy + radius * Math.sin(angle);
                        if (i === 0) ctx.moveTo(sx, sy);
                        else ctx.lineTo(sx, sy);
                    }
                    break;
            }

            ctx.closePath();
            ctx.fill();
        }

        // --- MATCH-3 EVALUATION & CASCADE PIPELINE ---
        function checkMatches() {
            let matched = new Set();

            // Horizontal Matches
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE - 2; c++) {
                    let type = grid[r][c]?.id;
                    if (type !== undefined && type === grid[r][c+1]?.id && type === grid[r][c+2]?.id) {
                        matched.add(`${r},${c}`);
                        matched.add(`${r},${c+1}`);
                        matched.add(`${r},${c+2}`);
                    }
                }
            }

            // Vertical Matches
            for (let c = 0; c < GRID_SIZE; c++) {
                for (let r = 0; r < GRID_SIZE - 2; r++) {
                    let type = grid[r][c]?.id;
                    if (type !== undefined && type === grid[r+1][c]?.id && type === grid[r+2][c]?.id) {
                        matched.add(`${r},${c}`);
                        matched.add(`${r+1},${c}`);
                        matched.add(`${r+2},${c}`);
                    }
                }
            }

            return Array.from(matched).map(coord => {
                const [r, c] = coord.split(',').map(Number);
                return { r, c };
            });
        }

        async function processTurn(r1, c1, r2, c2) {
            isProcessing = true;
            swapTiles(r1, c1, r2, c2);
            drawBoard();

            let matches = checkMatches();

            if (matches.length === 0) {
                // Invalid move: revert back
                await sleep(200);
                swapTiles(r1, c1, r2, c2);
                playSound(150, 0.15, false); // Low thud for invalid move
                drawBoard();
                isProcessing = false;
                return;
            }

            playSound(350, 0.1);

            // Cascade loop for chain reactions
            while (matches.length > 0) {
                await sleep(150);
                
                // Clear matched tiles and grant score
                matches.forEach(({ r, c }) => {
                    grid[r][c] = null;
                });
                score += matches.length * 10;
                scoreElement.innerText = score;
                playSound(500 + (matches.length * 20), 0.15);
                drawBoard();

                await sleep(150);
                
                // Drop existing tiles down
                dropTiles();
                drawBoard();

                await sleep(150);

                // Fill empty top cells
                fillTopTiles();
                drawBoard();

                // Check for chain-reaction matches
                matches = checkMatches();
            }

            isProcessing = false;
        }

        function swapTiles(r1, c1, r2, c2) {
            const temp = grid[r1][c1];
            grid[r1][c1] = grid[r2][c2];
            grid[r2][c2] = temp;
        }

        function dropTiles() {
            for (let c = 0; c < GRID_SIZE; c++) {
                let emptyRow = GRID_SIZE - 1;
                for (let r = GRID_SIZE - 1; r >= 0; r--) {
                    if (grid[r][c] !== null) {
                        if (r !== emptyRow) {
                            grid[emptyRow][c] = grid[r][c];
                            grid[r][c] = null;
                        }
                        emptyRow--;
                    }
                }
            }
        }

        function fillTopTiles() {
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c] === null) {
                        grid[r][c] = TILE_TYPES[Math.floor(Math.random() * TILE_TYPES.length)];
                    }
                }
            }
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // --- DRAG & TAP TOUCH/MOUSE CONTROLS ---
        function getCanvasCell(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const col = Math.floor((clientX - rect.left) * scaleX / TILE_SIZE);
            const row = Math.floor((clientY - rect.top) * scaleY / TILE_SIZE);

            if (col >= 0 && col < GRID_SIZE && row >= 0 && row < GRID_SIZE) {
                return { r: row, c: col };
            }
            return null;
        }

        function handlePointerDown(e) {
            e.preventDefault();
            if (isProcessing) return;

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const cell = getCanvasCell(clientX, clientY);
            if (cell) {
                dragStartTile = cell;
            }
        }

        function handlePointerUp(e) {
            e.preventDefault();
            if (isProcessing || !dragStartTile) return;

            const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
            const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;

            const endCell = getCanvasCell(clientX, clientY);

            if (endCell) {
                const distR = endCell.r - dragStartTile.r;
                const distC = endCell.c - dragStartTile.c;
                const isAdjacent = (Math.abs(distR) === 1 && distC === 0) || (Math.abs(distR) === 0 && Math.abs(distC) === 1);

                if (isAdjacent) {
                    // Dragged to adjacent tile
                    selectedTile = null;
                    processTurn(dragStartTile.r, dragStartTile.c, endCell.r, endCell.c);
                } else if (dragStartTile.r === endCell.r && dragStartTile.c === endCell.c) {
                    // Tap / Click fallback selection
                    if (!selectedTile) {
                        selectedTile = dragStartTile;
                    } else {
                        const selDistR = Math.abs(selectedTile.r - endCell.r);
                        const selDistC = Math.abs(selectedTile.c - endCell.c);
                        const isSelAdjacent = (selDistR === 1 && selDistC === 0) || (selDistR === 0 && selDistC === 1);

                        if (isSelAdjacent) {
                            const prev = selectedTile;
                            selectedTile = null;
                            processTurn(prev.r, prev.c, endCell.r, endCell.c);
                        } else {
                            selectedTile = endCell;
                        }
                    }
                }
            }

            dragStartTile = null;
            drawBoard();
        }

        // Event Listeners
        canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
        canvas.addEventListener('touchend', handlePointerUp, { passive: false });
        canvas.addEventListener('mousedown', handlePointerDown);
        canvas.addEventListener('mouseup', handlePointerUp);

        resetBtn.addEventListener('click', () => {
            initGame();
        });

        // Start Game
        initGame();
    </script>
</body>
</html>
